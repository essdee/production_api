name: Deploy production_api

on:
  workflow_dispatch:

concurrency:
  group: deploy-production_api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy
        env:
          BENCH_PATH: ${{ secrets.BENCH_PATH }}
          SITES: ${{ secrets.SITES }}
        run: |
          set -euo pipefail
          export PATH="/home/essdee_frappe/.nvm/versions/node/v24.14.1/bin:/home/essdee_frappe/.local/bin:/usr/local/bin:/usr/bin:/bin"

          cd "$BENCH_PATH/apps/production_api"

          OLD_SHA=$(git rev-parse HEAD)
          git pull
          NEW_SHA=$(git rev-parse HEAD)

          if [ "$OLD_SHA" = "$NEW_SHA" ]; then
            echo "No changes pulled. Nothing to deploy."
            exit 0
          fi

          CHANGED=$(git diff --name-only "$OLD_SHA" "$NEW_SHA")
          echo "Changed files:"
          echo "$CHANGED"

          needs_migrate=false
          needs_build=false
          needs_pip=false

          if echo "$CHANGED" | grep -qE '\.json$|(^|/)patches\.txt$|(^|/)patches/'; then
            needs_migrate=true
            needs_build=true
          fi
          if echo "$CHANGED" | grep -qE '\.(js|vue|css|scss|less|html|svg|png|jpg)$|/public/'; then
            needs_build=true
          fi
          if echo "$CHANGED" | grep -qE '(^|/)pyproject\.toml$|(^|/)setup\.py$|(^|/)MANIFEST\.in$'; then
            needs_pip=true
          fi

          cd "$BENCH_PATH"

          if [ "$needs_pip" = true ]; then
            echo "==> Reinstalling app (setup metadata changed)"
            ./env/bin/pip install -e apps/production_api
          fi

          if [ "$needs_migrate" = true ]; then
            IFS=',' read -ra SITE_LIST <<< "$SITES"
            for site in "${SITE_LIST[@]}"; do
              echo "==> Migrating $site"
              bench --site "$site" migrate
            done
          fi

          if [ "$needs_build" = true ]; then
            echo "==> Building assets"
            bench build --app production_api
          fi

          echo "==> Restarting"
          bench restart --supervisor
